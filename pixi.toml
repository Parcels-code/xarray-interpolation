[workspace]
name = "xarray-interpolation"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.14"
numpy = ">=2.4"
xarray = ">=2026.4"
dask = ">=2026.3"
zarr = ">=3"
marimo = "*"
python-graphviz = ">=0.21"
graphviz = "*"
snakeviz = ">=2.2.2,<3"
memray = ">=1.19.3,<2"
mypy = "*"
viztracer = ">=1.1.1,<2"

[tasks]
typecheck = { cmd = "mypy" }
