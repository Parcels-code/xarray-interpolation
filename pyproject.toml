[tool.mypy]
files = ["data-generation.py", "xarray-profile.py"]
check_untyped_defs = true
show_error_context = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = [
  "dask.*",
  "zarr.*",
  "graphviz",
  "viztracer",
]
ignore_missing_imports = true
